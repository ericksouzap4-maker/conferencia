<script>
// Define data de hoje como padrão
document.getElementById('data-conf').value = new Date().toISOString().split('T')[0];

function formatarData(dateStr) {
  var d = new Date(dateStr + 'T12:00:00');
  var meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  return d.getDate() + ' de ' + meses[d.getMonth()] + ' de ' + d.getFullYear();
}

function corLinha(sit) {
  if (sit === 'EM USO')        return 'linha-verde';
  if (sit === 'SUCATA')        return 'linha-vermelha';
  if (sit === 'A DESCARREGAR') return 'linha-amarela';
  if (sit === 'EM MANUTENCAO') return 'linha-azul';
  return '';
}

function badgeSit(sit) {
  if (!sit || sit === '') return '<span class="sit-badge sit-pendente">PENDENTE</span>';
  var cls = sit === 'EM USO' ? 'sit-em-uso' : sit === 'SUCATA' ? 'sit-sucata' : sit === 'A DESCARREGAR' ? 'sit-descarregar' : 'sit-manutencao';
  return '<span class="sit-badge ' + cls + '">' + sit + '</span>';
}

async function gerarRelatorio() {
  var url      = document.getElementById('url-webapp').value.trim();
  var nomeResp = document.getElementById('nome-resp').value.trim();
  var matricula= document.getElementById('matricula').value.trim();
  var dataConf = document.getElementById('data-conf').value;

  if (!url || !nomeResp || !matricula || !dataConf) {
    var erro = document.getElementById('erro');
    erro.textContent = 'Preencha todos os campos antes de gerar.';
    erro.style.display = 'block';
    return;
  }
  document.getElementById('erro').style.display = 'none';
  var btn = document.getElementById('btn-gerar');
  btn.disabled = true;
  btn.textContent = 'Buscando dados...';

  try {
    var resp = await fetch(url + '?acao=status_comodo');
    var statusMap = await resp.json();

    // Busca todos os itens da planilha
    var respItens = await fetch(url + '?acao=todos_itens');
    var todosItens = null;
    try { todosItens = await respItens.json(); } catch(e) { todosItens = null; }

    // Se não tiver a rota todos_itens, usa os dados do status
    renderDoc(statusMap, nomeResp, matricula, dataConf, url);

    document.getElementById('tela-config').style.display = 'none';
    document.getElementById('tela-relatorio').style.display = 'block';
  } catch(e) {
    var erro = document.getElementById('erro');
    erro.textContent = 'Erro ao buscar dados: ' + e.message;
    erro.style.display = 'block';
  }
  btn.disabled = false;
  btn.textContent = '📄 GERAR RELATÓRIO PDF';
}
