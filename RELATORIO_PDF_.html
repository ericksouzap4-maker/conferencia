<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Relatorio de Conferencia - 39a Cia PM</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e2e8f0; }
  .tela-config { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
  .titulo-app { font-size: 12px; letter-spacing: 4px; color: #4b5563; text-transform: uppercase; text-align: center; margin-bottom: 10px; }
  .nome-app { font-size: 30px; font-weight: 900; text-align: center; color: #fff; margin-bottom: 6px; }
  .sub-app { font-size: 14px; color: #6b7280; text-align: center; margin-bottom: 40px; }
  .painel { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 20px; padding: 36px; width: 100%; max-width: 540px; }
  .painel label { display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #6b7280; margin-bottom: 8px; }
  .painel input { width: 100%; padding: 13px 16px; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 10px; color: #fff; font-size: 14px; outline: none; margin-bottom: 16px; }
  .painel input:focus { border-color: #1d6ef5; }
  .btn-gerar { width: 100%; padding: 16px; background: #1d6ef5; border: none; border-radius: 12px; color: #fff; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 8px; }
  .btn-gerar:disabled { background: #2a2a4a; color: #4a4a6a; cursor: not-allowed; }
  .erro { background: #3a1a1a; border: 1px solid #ef4444; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #fca5a5; margin-top: 16px; display: none; }
  .tela-relatorio { display: none; padding: 20px; }
  .barra-topo-rel { background: #1a1a2e; border-bottom: 1px solid #2a2a4a; padding: 14px 28px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
  .barra-topo-rel h1 { font-size: 15px; font-weight: 700; flex: 1; }
  .btn-imprimir { padding: 10px 24px; background: #1d6ef5; border: none; border-radius: 8px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; }
  .btn-voltar-rel { padding: 10px 20px; background: transparent; border: 1px solid #2a2a4a; border-radius: 8px; color: #9ca3af; font-size: 14px; cursor: pointer; }
  .doc { background: #fff; color: #000; max-width: 780px; margin: 20px auto; padding: 48px 56px; font-family: 'Times New Roman', serif; font-size: 12pt; line-height: 1.5; }
  .cabecalho-pm { display: flex; align-items: center; gap: 20px; border-bottom: 2px solid #000; padding-bottom: 16px; margin-bottom: 24px; }
  .cabecalho-pm img { width: 80px; height: 80px; object-fit: contain; }
  .cabecalho-pm .texto-cab { flex: 1; text-align: center; }
  .cabecalho-pm .texto-cab .linha1 { font-size: 13pt; font-weight: bold; letter-spacing: 1px; }
  .cabecalho-pm .texto-cab .linha2 { font-size: 11pt; font-weight: bold; }
  .cabecalho-pm .texto-cab .linha3 { font-size: 11pt; font-weight: bold; }
  .titulo-doc { font-size: 13pt; font-weight: bold; margin-bottom: 6px; }
  .data-doc { margin-bottom: 20px; font-size: 11pt; }
  .assunto-doc { margin-bottom: 20px; font-size: 11pt; }
  .corpo-doc { margin-bottom: 24px; text-align: justify; font-size: 11pt; }
  .resumo-box { border: 1px solid #000; padding: 14px 18px; margin-bottom: 24px; }
  .resumo-box table { width: 100%; border-collapse: collapse; font-size: 11pt; }
  .resumo-box table td { padding: 4px 8px; }
  .resumo-box table td:first-child { font-weight: bold; width: 200px; }
  .sit-badge { display: inline-block; padding: 1px 8px; border-radius: 3px; font-size: 9pt; font-weight: bold; }
  .sit-em-uso { background: #d4edda; color: #155724; }
  .sit-sucata { background: #f8d7da; color: #721c24; }
  .sit-descarregar { background: #fff3cd; color: #856404; }
  .sit-manutencao { background: #d1ecf1; color: #0c5460; }
  .sit-pendente { background: #e2e3e5; color: #383d41; }
  .tabela-itens { width: 100%; border-collapse: collapse; margin-bottom: 24px; font-size: 10pt; }
  .tabela-itens th { background: #1a1a2e; color: #fff; padding: 7px 10px; text-align: left; font-size: 10pt; }
  .tabela-itens td { padding: 6px 10px; border-bottom: 1px solid #dee2e6; vertical-align: top; }
  .tabela-itens tr:nth-child(even) td { background: #f8f9fa; }
  .tabela-itens tr.linha-verde td { background: #d4edda; }
  .tabela-itens tr.linha-vermelha td { background: #f8d7da; }
  .tabela-itens tr.linha-amarela td { background: #fff3cd; }
  .tabela-itens tr.linha-azul td { background: #d1ecf1; }
  .secao-local { font-size: 11pt; font-weight: bold; letter-spacing: 1px; color: #1a1a2e; border-left: 3px solid #1a1a2e; padding-left: 10px; margin: 20px 0 10px; }
  .assinatura { margin-top: 48px; text-align: center; }
  .assinatura .linha-assin { border-top: 1px solid #000; width: 300px; margin: 0 auto 6px; }
  .assinatura p { font-size: 11pt; }
  .rodape-doc { border-top: 1px solid #000; padding-top: 10px; margin-top: 32px; font-size: 9pt; color: #555; text-align: center; }
  @media print {
    body { background: #fff !important; }
    .barra-topo-rel, .tela-config { display: none !important; }
    .tela-relatorio { display: block !important; padding: 0; }
    .doc { margin: 0; padding: 32px 40px; box-shadow: none; }
    .secao-local { color: #000 !important; }
  }
</style>
</head>
<body>
<div class="tela-config" id="tela-config">
  <div class="titulo-app">Policia Militar de Minas Gerais</div>
  <div class="nome-app">Relatorio de Conferencia</div>
  <div class="sub-app">39a Cia PM / 18o BPM - Mapa de Carga</div>
  <div class="painel">
    <label>URL do Web App (Apps Script)</label>
    <input type="text" id="url-webapp" placeholder="https://script.google.com/macros/s/.../exec"
      value="https://script.google.com/macros/s/AKfycbz7LQwsrslCW-DegkBmHC7QSWW43-DwSPHq7FfHvPVJEzYiFD5KLGuDTeHTToDh4jrYow/exec">
    <label>Nome do responsavel pela conferencia</label>
    <input type="text" id="nome-resp" placeholder="Ex: SD PM Erick Souza">
    <label>Numero de matricula</label>
    <input type="text" id="matricula" placeholder="Ex: 1813161">
    <label>Data da conferencia</label>
    <input type="date" id="data-conf">
    <button class="btn-gerar" id="btn-gerar" onclick="gerarRelatorio()">GERAR RELATORIO PDF</button>
    <div class="erro" id="erro"></div>
  </div>
</div>
<div class="tela-relatorio" id="tela-relatorio">
  <div class="barra-topo-rel">
    <button class="btn-voltar-rel" onclick="voltar()">Voltar</button>
    <h1>Relatorio de Conferencia - 39a Cia PM</h1>
    <button class="btn-imprimir" onclick="window.print()">Imprimir / Salvar PDF</button>
  </div>
  <div class="doc" id="doc"></div>
</div>
<script>
document.getElementById('data-conf').value = new Date().toISOString().split('T')[0];

function formatarData(dateStr) {
  var d = new Date(dateStr + 'T12:00:00');
  var meses = ['janeiro','fevereiro','marco','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  return d.getDate() + ' de ' + meses[d.getMonth()] + ' de ' + d.getFullYear();
}

function corLinha(sit) {
  if (sit === 'EM USO') return 'linha-verde';
  if (sit === 'SUCATA') return 'linha-vermelha';
  if (sit === 'A DESCARREGAR') return 'linha-amarela';
  if (sit === 'EM MANUTENCAO') return 'linha-azul';
  return '';
}

function badgeSit(sit) {
  if (!sit || sit === '') return '<span class="sit-badge sit-pendente">PENDENTE</span>';
  var cls = sit === 'EM USO' ? 'sit-em-uso' : sit === 'SUCATA' ? 'sit-sucata' : sit === 'A DESCARREGAR' ? 'sit-descarregar' : 'sit-manutencao';
  return '<span class="sit-badge ' + cls + '">' + sit + '</span>';
}

async function gerarRelatorio() {
  var url = document.getElementById('url-webapp').value.trim();
  var nomeResp = document.getElementById('nome-resp').value.trim();
  var matricula = document.getElementById('matricula').value.trim();
  var dataConf = document.getElementById('data-conf').value;
  if (!url || !nomeResp || !matricula || !dataConf) {
    var erro = document.getElementById('erro');
    erro.textContent = 'Preencha todos os campos.';
    erro.style.display = 'block';
    return;
  }
  document.getElementById('erro').style.display = 'none';
  var btn = document.getElementById('btn-gerar');
  btn.disabled = true;
  btn.textContent = 'Buscando dados...';
  try {
    // Busca itens diretamente da planilha
    var respItens = await fetch(url + '?acao=todos_itens');
    var todosItens = await respItens.json();
    renderDoc(todosItens, nomeResp, matricula, dataConf);
    document.getElementById('tela-config').style.display = 'none';
    document.getElementById('tela-relatorio').style.display = 'block';
  } catch(e) {
    var erro = document.getElementById('erro');
    erro.textContent = 'Erro ao buscar dados: ' + e.message;
    erro.style.display = 'block';
  }
  btn.disabled = false;
  btn.textContent = 'GERAR RELATORIO PDF';
}

function renderDoc(itens, nomeResp, matricula, dataConf) {
  // Agrupa por local
  var grupos = {};
  itens.forEach(function(item) {
    var local = (item.local || '').trim();
    if (!grupos[local]) grupos[local] = [];
    grupos[local].push(item);
  });

  // Contagens
  var total = itens.length;
  var conferidos = 0, pendentes = 0, emUso = 0, sucata = 0, descarregar = 0, manutencao = 0;
  itens.forEach(function(item) {
    if (item.status === 'CONFERIDO') {
      conferidos++;
      var sit = (!item.situacao || item.situacao === '' || item.situacao === 'undefined') ? 'EM USO' : item.situacao;
      if (sit === 'EM USO') emUso++;
      if (sit === 'SUCATA') sucata++;
      if (sit === 'A DESCARREGAR') descarregar++;
      if (sit === 'EM MANUTENCAO') manutencao++;
    } else {
      pendentes++;
    }
  });
  var pct = total > 0 ? Math.round((conferidos / total) * 100) : 0;
  var dataFormatada = formatarData(dataConf);
  var locaisOrdenados = Object.keys(grupos).sort();
