<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Conferencia de Armamentos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Segoe UI,sans-serif;background:#0f0f1a;color:#e2e8f0;padding-bottom:100px}
.cab{background:#1a1a2e;border-bottom:1px solid #2a2a4a;padding:18px 20px;position:sticky;top:0;z-index:10}
.cab .sub{font-size:11px;letter-spacing:3px;color:#4b5563;text-transform:uppercase;margin-bottom:4px}
.cab h1{font-size:20px;font-weight:800;color:#fff}
.cab .ptxt{font-size:12px;color:#6b7280;margin-top:4px}
.bbg{height:4px;background:#0f0f1a;margin-top:10px;border-radius:999px}
.bfill{height:4px;background:#ef4444;border-radius:999px;transition:width 0.3s}
.cop{padding:14px 20px;background:#111827;border-bottom:1px solid #2a2a4a;display:flex;gap:8px;align-items:center}
.cop input{flex:1;padding:10px 14px;background:#0f0f1a;border:1px solid #2a2a4a;border-radius:8px;color:#fff;font-size:14px;outline:none}
.btr{padding:10px 14px;background:transparent;border:1px solid #2a2a4a;border-radius:8px;color:#6b7280;font-size:12px;cursor:pointer;white-space:nowrap}
.lista{padding:12px 16px}
.item{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.item.ok{background:#1a0f0f;border-color:#ef4444}
.itopo{display:flex;align-items:flex-start;gap:12px}
.chk{width:22px;height:22px;min-width:22px;accent-color:#ef4444;cursor:pointer;margin-top:2px}
.iinfo{flex:1}
.serie{font-size:20px;font-weight:900;color:#ef4444;letter-spacing:2px;font-family:monospace}
.item.ok .serie{color:#ff6b6b}
.cabide{font-size:13px;color:#9ca3af;margin-top:2px}
.cabide span{color:#f59e0b;font-weight:700}
.inome{font-size:12px;color:#6b7280;margin-top:3px}
.ipat{font-size:11px;color:#374151;font-family:monospace;margin-top:2px}
.iconf{font-size:11px;color:#f87171;margin-top:4px;display:none}
.item.ok .iconf{display:block}
.idet{margin-top:10px;display:none}
.idet select{width:100%;padding:8px 12px;background:#0f0f1a;border:1px solid #2a2a4a;border-radius:8px;color:#fff;font-size:13px;outline:none;margin-bottom:8px;cursor:pointer}
.idet select option{background:#1a1a2e}
.sit-em-uso{border-color:#22c55e!important;color:#22c55e!important}
.sit-sucata{border-color:#ef4444!important;color:#ef4444!important}
.sit-descarregar{border-color:#f59e0b!important;color:#f59e0b!important}
.sit-manutencao{border-color:#38bdf8!important;color:#38bdf8!important}
.idet textarea{width:100%;padding:8px 12px;background:#0f0f1a;border:1px solid #2a2a4a;border-radius:8px;color:#fff;font-size:13px;outline:none;resize:none;min-height:50px;font-family:inherit}
.rodape{position:fixed;bottom:0;left:0;right:0;background:#1a1a2e;border-top:1px solid #2a2a4a;padding:14px 20px}
.benv{width:100%;padding:16px;background:#ef4444;border:none;border-radius:10px;color:#fff;font-size:17px;font-weight:700;cursor:pointer}
.benv:disabled{background:#2a2a4a;color:#4a4a6a;cursor:not-allowed}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;z-index:100}
.modal.show{display:flex}
.mbox{background:#1a1a2e;border-radius:16px;padding:32px 24px;max-width:340px;width:90%;text-align:center;border:1px solid #2a2a4a}
.mic{font-size:56px;margin-bottom:12px}
.mmsg{font-size:16px;font-weight:600;margin-bottom:6px}
.mdet{font-size:13px;color:#6b7280}
.erro{text-align:center;padding:40px 20px;color:#6b7280;font-size:14px}
</style>
</head>
<body>
<div id="erro-local" class="erro" style="display:none">Tipo de armamento nao encontrado.</div>
<div id="app" style="display:none">
  <div class="cab">
    <div class="sub">P4 - Conferencia de Armamentos</div>
    <h1 id="titulo-local"></h1>
    <div class="ptxt" id="ptxt">Carregando...</div>
    <div class="bbg"><div class="bfill" id="bfill" style="width:0%"></div></div>
  </div>
  <div class="cop">
    <input type="text" id="op" placeholder="Seu nome / matricula">
    <button class="btr" onclick="trocar()">Trocar</button>
  </div>
  <div class="lista" id="lista"></div>
  <div class="rodape">
    <button class="benv" id="btn" onclick="enviar()" disabled>ENVIAR CONFERENCIA</button>
  </div>
  <div class="modal" id="modal">
    <div class="mbox">
      <div class="mic" id="mic"></div>
      <div class="mmsg" id="mmsg"></div>
      <div class="mdet" id="mdet"></div>
    </div>
  </div>
</div>
<script>
var WEB_APP = "https://script.google.com/macros/s/AKfycbz7LQwsrslCW-DegkBmHC7QSWW43-DwSPHq7FfHvPVJEzYiFD5KLGuDTeHTToDh4jrYow/exec";
var GRUPOS = {"PISTOLAS": [{"patrimonio": "2542778-4", "serie": "SUK08210", "nome": "PISTOLA PT100 .40", "cabide": ""}, {"patrimonio": "2728189-2", "serie": "EKA01287", "nome": "PISTOLA IMBEL MD5 .40", "cabide": "31"}, {"patrimonio": "2728190-6", "serie": "EKA01288", "nome": "PISTOLA IMBEL MD5 .40", "cabide": "1"}, {"patrimonio": "2734356-1", "serie": "EKA02801", "nome": "PISTOLA IMBEL MD5 .40", "cabide": "3"}, {"patrimonio": "2736910-2", "serie": "EKA04583", "nome": "PISTOLA .40", "cabide": "4"}, {"patrimonio": "2736918-8", "serie": "EKA04591", "nome": "PISTOLA .40", "cabide": "43"}, {"patrimonio": "2736922-6", "serie": "EKA04595", "nome": "PISTOLA .40", "cabide": "5"}, {"patrimonio": "2739546-4", "serie": "EKA06485", "nome": "PISTOLA IMBEL MD5 .40", "cabide": "46"}, {"patrimonio": "2739568-5", "serie": "EKA06507", "nome": "PISTOLA IMBEL MD5 .40", "cabide": "6"}, {"patrimonio": "2739625-8", "serie": "EKA06564", "nome": "PISTOLA IMBEL MD5 .40", "cabide": "7"}, {"patrimonio": "2739631-2", "serie": "EKA06570", "nome": "PISTOLA IMBEL MD5 .40", "cabide": "8"}, {"patrimonio": "2739868-4", "serie": "EKA06791", "nome": "PISTOLA IMBEL MD5 .40", "cabide": "9"}, {"patrimonio": "2739872-2", "serie": "EKA06795", "nome": "PISTOLA IMBEL MD5 .40", "cabide": ""}, {"patrimonio": "2739882-0", "serie": "EKA06805", "nome": "PISTOLA IMBEL MD5 .40", "cabide": "44"}, {"patrimonio": "2739890-0", "serie": "EKA06813", "nome": "PISTOLA IMBEL MD5 .40", "cabide": "10"}, {"patrimonio": "3053176-4", "serie": "EKA07200", "nome": "PISTOLA IMBEL MD5 .40", "cabide": "24"}, {"patrimonio": "3053306-6", "serie": "EKA07330", "nome": "PISTOLA IMBEL MD5 .40", "cabide": "11"}, {"patrimonio": "3065255-3", "serie": "EKA09413", "nome": "PISTOLA .40", "cabide": "12"}, {"patrimonio": "3065264-2", "serie": "EKA09640", "nome": "PISTOLA .40", "cabide": "13"}, {"patrimonio": "4049358-0", "serie": "EQA00444", "nome": "PISTOLA .40", "cabide": "2"}, {"patrimonio": "4049360-1", "serie": "EQA00446", "nome": "PISTOLA .40", "cabide": "14"}, {"patrimonio": "4049362-8", "serie": "EQA00448", "nome": "PISTOLA .40", "cabide": "15"}, {"patrimonio": "4049363-6", "serie": "EQA00449", "nome": "PISTOLA .40", "cabide": "16"}, {"patrimonio": "4049364-4", "serie": "EQA00450", "nome": "PISTOLA .40", "cabide": "17"}, {"patrimonio": "4267232-5", "serie": "EKA38358", "nome": "PISTOLA", "cabide": "18"}, {"patrimonio": "4267237-6", "serie": "EKA38363", "nome": "PISTOLA", "cabide": "21"}, {"patrimonio": "4267238-4", "serie": "EKA38364", "nome": "PISTOLA", "cabide": "22"}, {"patrimonio": "4267239-2", "serie": "EKA38365", "nome": "PISTOLA", "cabide": "23"}, {"patrimonio": "4267240-6", "serie": "EKA38366", "nome": "PISTOLA", "cabide": "19"}, {"patrimonio": "4267530-8", "serie": "EQA01427", "nome": "PISTOLA .40", "cabide": ""}, {"patrimonio": "4267532-4", "serie": "EQA01431", "nome": "PISTOLA .40", "cabide": "25"}, {"patrimonio": "4267535-9", "serie": "EQA01437", "nome": "PISTOLA .40", "cabide": "26"}, {"patrimonio": "4267537-5", "serie": "EQA01440", "nome": "PISTOLA .40", "cabide": "27"}, {"patrimonio": "4267564-2", "serie": "EQA00762", "nome": "PISTOLA .40", "cabide": "28"}, {"patrimonio": "4267576-6", "serie": "EQA00783", "nome": "PISTOLA .40", "cabide": "20"}, {"patrimonio": "4270470-7", "serie": "EKA39789", "nome": "PISTOLA", "cabide": "29"}, {"patrimonio": "5238921-9", "serie": "EQA05783", "nome": "PISTOLA .40", "cabide": "30"}, {"patrimonio": "5238929-4", "serie": "EQA05791", "nome": "PISTOLA .40", "cabide": "32"}, {"patrimonio": "5238930-8", "serie": "EQA05792", "nome": "PISTOLA .40", "cabide": "33"}, {"patrimonio": "5238931-6", "serie": "EQA05793", "nome": "PISTOLA .40", "cabide": "34"}, {"patrimonio": "5238932-4", "serie": "EQA05794", "nome": "PISTOLA .40", "cabide": "35"}, {"patrimonio": "5238933-2", "serie": "EQA05795", "nome": "PISTOLA .40", "cabide": "36"}, {"patrimonio": "5238934-0", "serie": "EQA05796", "nome": "PISTOLA .40", "cabide": "37"}, {"patrimonio": "5238935-9", "serie": "EQA05797", "nome": "PISTOLA .40", "cabide": "38"}, {"patrimonio": "5238936-7", "serie": "EQA05798", "nome": "PISTOLA .40", "cabide": "39"}, {"patrimonio": "5238938-3", "serie": "EQA05800", "nome": "PISTOLA .40", "cabide": "40"}, {"patrimonio": "5239652-5", "serie": "EQA06171", "nome": "PISTOLA .40", "cabide": "41"}, {"patrimonio": "5937161-7", "serie": "EQA09049", "nome": "PISTOLA .40", "cabide": "42"}, {"patrimonio": "5940188-5", "serie": "EQA09029", "nome": "PISTOLA .40", "cabide": ""}], "ESPINGARDAS": [{"patrimonio": "2542650-8", "serie": "94535", "nome": "ESPINGARDA 12", "cabide": ""}, {"patrimonio": "2542752-0", "serie": "135859", "nome": "ESPINGARDA 12", "cabide": ""}, {"patrimonio": "2746933-6", "serie": "AHB166417", "nome": "ESPINGARDA 12", "cabide": ""}, {"patrimonio": "8703729-7", "serie": "KVH4724896", "nome": "ESPINGARDA 12", "cabide": ""}], "CARABINAS": [{"patrimonio": "3551129-0", "serie": "JAA03734", "nome": "CARABINA 5.56x45MM", "cabide": ""}, {"patrimonio": "4266787-9", "serie": "JAA02729", "nome": "CARABINA 5.56x45MM", "cabide": ""}, {"patrimonio": "5932895-9", "serie": "JAA05320", "nome": "CARABINA 5.56x45MM", "cabide": ""}], "TASERS": [{"patrimonio": "5989944-1", "serie": "SC0037343", "nome": "ARMA DE IMOBILIZACAO", "cabide": ""}, {"patrimonio": "7720263-5", "serie": "SC0020966", "nome": "ARMA DE IMOBILIZACAO", "cabide": ""}, {"patrimonio": "7720278-3", "serie": "SC0021414", "nome": "ARMA DE IMOBILIZACAO", "cabide": ""}, {"patrimonio": "7720279-1", "serie": "SC0021671", "nome": "ARMA DE IMOBILIZACAO", "cabide": ""}, {"patrimonio": "8703933-8", "serie": "SC0028211", "nome": "ARMA DE IMOBILIZACAO", "cabide": ""}, {"patrimonio": "8703934-6", "serie": "SC0028207", "nome": "ARMA DE IMOBILIZACAO", "cabide": ""}, {"patrimonio": "8703944-3", "serie": "SC0028241", "nome": "ARMA DE IMOBILIZACAO", "cabide": ""}, {"patrimonio": "8703946-0", "serie": "SC0028116", "nome": "ARMA DE IMOBILIZACAO", "cabide": ""}, {"patrimonio": "8703947-8", "serie": "SC0028242", "nome": "ARMA DE IMOBILIZACAO", "cabide": ""}, {"patrimonio": "8703948-6", "serie": "SC0028256", "nome": "ARMA DE IMOBILIZACAO", "cabide": ""}, {"patrimonio": "9801397-1", "serie": "SC0032502", "nome": "ARMA DE IMOBILIZACAO", "cabide": ""}, {"patrimonio": "9801398-0", "serie": "SC0032481", "nome": "ARMA DE IMOBILIZACAO", "cabide": ""}]};
var params = new URLSearchParams(window.location.search);
var TIPO = params.get('tipo') || '';
var ST = {};

if (!TIPO || !GRUPOS[TIPO]) {
  document.getElementById('erro-local').style.display = 'block';
} else {
  document.getElementById('app').style.display = 'block';
  document.getElementById('titulo-local').textContent = TIPO;
  var n = localStorage.getItem('operador_nome') || '';
  if (n) document.getElementById('op').value = n;
  fetch(WEB_APP + '?acao=status_comodo')
    .then(function(r) { return r.json(); })
    .then(function(d) { ST = d; render(); })
    .catch(function() { render(); });
}

function corSit(v) {
  if (v === 'EM USO') return 'sit-em-uso';
  if (v === 'SUCATA') return 'sit-sucata';
  if (v === 'A DESCARREGAR') return 'sit-descarregar';
  if (v === 'EM MANUTENCAO') return 'sit-manutencao';
  return 'sit-em-uso';
}

function criarItem(item) {
  var st = ST[item.patrimonio] || {};
  var conf = st.status === 'CONFERIDO';
  var sit = (st.situacao && st.situacao !== 'undefined') ? st.situacao : 'EM USO';
  var div = document.createElement('div');
  div.className = 'item' + (conf ? ' ok' : '');
  div.id = 'i-' + item.patrimonio;
  var itopo = document.createElement('div'); itopo.className = 'itopo';
  var chk = document.createElement('input'); chk.type = 'checkbox'; chk.className = 'chk';
  chk.id = 'c-' + item.patrimonio; chk.checked = conf;
  chk.onchange = function() { tog(chk, item.patrimonio); };
  var iinfo = document.createElement('div'); iinfo.className = 'iinfo';
  var serie = document.createElement('div'); serie.className = 'serie'; serie.textContent = item.serie;
  var inome = document.createElement('div'); inome.className = 'inome'; inome.textContent = item.nome;
  var ipat = document.createElement('div'); ipat.className = 'ipat'; ipat.textContent = 'Pat: ' + item.patrimonio;
  iinfo.appendChild(serie);
  if (item.cabide) {
    var cabDiv = document.createElement('div'); cabDiv.className = 'cabide';
    cabDiv.innerHTML = 'Cabide: <span>' + item.cabide + '</span>';
    iinfo.appendChild(cabDiv);
  }
  iinfo.appendChild(inome); iinfo.appendChild(ipat);
  var iconf = document.createElement('div'); iconf.className = 'iconf'; iconf.id = 'cf-' + item.patrimonio;
  iconf.textContent = conf ? 'Por: ' + (st.confPor || '') : '';
  iinfo.appendChild(iconf);
  itopo.appendChild(chk); itopo.appendChild(iinfo);
  var idet = document.createElement('div'); idet.className = 'idet'; idet.id = 'ob-' + item.patrimonio;
  if (conf) idet.style.display = 'block';
  var sel = document.createElement('select'); sel.id = 'st-' + item.patrimonio; sel.className = corSit(sit);
  ['EM USO','SUCATA','A DESCARREGAR','EM MANUTENCAO'].forEach(function(op) {
    var o = document.createElement('option'); o.value = op; o.textContent = op;
    if (sit === op) o.selected = true;
    sel.appendChild(o);
  });
  sel.onchange = function() { sel.className = corSit(sel.value); };
  var ta = document.createElement('textarea'); ta.id = 'tx-' + item.patrimonio;
  ta.placeholder = 'Observacao opcional'; ta.value = st.obs || '';
  idet.appendChild(sel); idet.appendChild(ta);
  div.appendChild(itopo); div.appendChild(idet);
  return div;
}

function render() {
  var itens = GRUPOS[TIPO] || [];
  var lista = document.getElementById('lista');
  lista.innerHTML = '';
  itens.forEach(function(item) { lista.appendChild(criarItem(item)); });
  prog();
}

function tog(chk, pat) {
  var d = document.getElementById('i-' + pat);
  var ob = document.getElementById('ob-' + pat);
  if (chk.checked) { d.classList.add('ok'); ob.style.display = 'block'; }
  else { d.classList.remove('ok'); ob.style.display = 'none'; }
  prog();
}

function prog() {
  var itens = GRUPOS[TIPO] || [];
  var t = itens.length;
  var m = document.querySelectorAll('.chk:checked').length;
  var p = t > 0 ? Math.round(m / t * 100) : 0;
  document.getElementById('ptxt').textContent = m + ' de ' + t + ' itens (' + p + '%)';
  document.getElementById('bfill').style.width = p + '%';
  document.getElementById('btn').disabled = (m === 0);
}

function trocar() {
  localStorage.removeItem('operador_nome');
  document.getElementById('op').value = '';
  document.getElementById('op').focus();
}

function enviar() {
  var op = document.getElementById('op').value.trim();
  if (!op) { alert('Digite seu nome ou matricula.'); return; }
  localStorage.setItem('operador_nome', op);
  var itens = [];
  document.querySelectorAll('.chk:checked').forEach(function(c) {
    var p = c.id.replace('c-', '');
    var tx = document.getElementById('tx-' + p);
    var sit = document.getElementById('st-' + p);
    itens.push({ patrimonio: p, obs: tx ? tx.value.trim() : '', situacao: sit ? sit.value : 'EM USO' });
  });
  document.getElementById('btn').disabled = true;
  document.getElementById('btn').textContent = 'Enviando...';
  fetch(WEB_APP, {
    method: 'POST',
    body: JSON.stringify({ tipo: 'comodo', itens: itens, operador: op })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    document.getElementById('mic').textContent = d.sucesso ? '\u2705' : '\u274c';
    document.getElementById('mmsg').textContent = d.sucesso ? d.confirmados + ' armamentos conferidos!' : 'Erro ao enviar';
    document.getElementById('mdet').textContent = d.sucesso ? 'Registrado em ' + d.dataHora : '';
    document.getElementById('modal').classList.add('show');
    if (d.sucesso) setTimeout(function() { location.reload(); }, 3000);
  })
  .catch(function() {
    document.getElementById('mic').textContent = '\u274c';
    document.getElementById('mmsg').textContent = 'Erro de conexao.';
    document.getElementById('modal').classList.add('show');
  });
}
</script>
</body>
</html>
