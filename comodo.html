<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Conferencia por Comodo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Segoe UI,sans-serif;background:#0f0f1a;color:#e2e8f0;padding-bottom:100px}
.cab{background:#1a1a2e;border-bottom:1px solid #2a2a4a;padding:18px 20px;position:sticky;top:0;z-index:10}
.cab .sub{font-size:11px;letter-spacing:3px;color:#4b5563;text-transform:uppercase;margin-bottom:4px}
.cab h1{font-size:20px;font-weight:800;color:#fff}
.cab .ptxt{font-size:12px;color:#6b7280;margin-top:4px}
.bbg{height:4px;background:#0f0f1a;margin-top:10px;border-radius:999px}
.bfill{height:4px;background:#22c55e;border-radius:999px;transition:width 0.3s}
.cop{padding:14px 20px;background:#111827;border-bottom:1px solid #2a2a4a;display:flex;gap:8px;align-items:center}
.cop input{flex:1;padding:10px 14px;background:#0f0f1a;border:1px solid #2a2a4a;border-radius:8px;color:#fff;font-size:14px;outline:none}
.btr{padding:10px 14px;background:transparent;border:1px solid #2a2a4a;border-radius:8px;color:#6b7280;font-size:12px;cursor:pointer;white-space:nowrap}
.lista{padding:12px 16px}
.item{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.item.ok{background:#0f2a1a;border-color:#166534}
.itopo{display:flex;align-items:flex-start;gap:12px}
.chk{width:22px;height:22px;min-width:22px;accent-color:#22c55e;cursor:pointer;margin-top:2px}
.iinfo{flex:1}
.inome{font-size:14px;font-weight:600;color:#e2e8f0;line-height:1.3}
.ipat{font-size:11px;color:#4b5563;font-family:monospace;margin-top:2px}
.iconf{font-size:11px;color:#4ade80;margin-top:4px;display:none}
.item.ok .iconf{display:block}
.idet{margin-top:10px;display:none}
.idet select{width:100%;padding:8px 12px;background:#0f0f1a;border:1px solid #2a2a4a;border-radius:8px;color:#fff;font-size:13px;outline:none;margin-bottom:8px;cursor:pointer}
.idet select option{background:#1a1a2e}
.sit-em-uso{border-color:#22c55e!important;color:#22c55e!important}
.sit-sucata{border-color:#ef4444!important;color:#ef4444!important}
.sit-descarregar{border-color:#f59e0b!important;color:#f59e0b!important}
.sit-manutencao{border-color:#38bdf8!important;color:#38bdf8!important}
.idet textarea{width:100%;padding:8px 12px;background:#0f0f1a;border:1px solid #2a2a4a;border-radius:8px;color:#fff;font-size:13px;outline:none;resize:none;min-height:50px;font-family:inherit}
.rodape{position:fixed;bottom:0;left:0;right:0;background:#1a1a2e;border-top:1px solid #2a2a4a;padding:14px 20px}
.benv{width:100%;padding:16px;background:#22c55e;border:none;border-radius:10px;color:#fff;font-size:17px;font-weight:700;cursor:pointer}
.benv:disabled{background:#2a2a4a;color:#4a4a6a;cursor:not-allowed}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;z-index:100}
.modal.show{display:flex}
.mbox{background:#1a1a2e;border-radius:16px;padding:32px 24px;max-width:340px;width:90%;text-align:center;border:1px solid #2a2a4a}
.mic{font-size:56px;margin-bottom:12px}.mmsg{font-size:16px;font-weight:600;margin-bottom:6px}.mdet{font-size:13px;color:#6b7280}
.erro{text-align:center;padding:40px 20px;color:#6b7280;font-size:14px}
</style>
</head>
<body>

<div id="erro-local" class="erro" style="display:none">Local não encontrado.</div>

<div id="app" style="display:none">
  <div class="cab">
    <div class="sub">P4 - Conferencia de Material</div>
    <h1 id="titulo-local"></h1>
    <div class="ptxt" id="ptxt">Carregando...</div>
    <div class="bbg"><div class="bfill" id="bfill" style="width:0%"></div></div>
  </div>
  <div class="cop">
    <input type="text" id="op" placeholder="Seu nome / matricula">
    <button class="btr" onclick="trocar()">Trocar</button>
  </div>
  <div class="lista" id="lista">Carregando...</div>
  <div class="rodape">
    <button class="benv" id="btn" onclick="enviar()" disabled>ENVIAR CONFERENCIA</button>
  </div>
  <div class="modal" id="modal">
    <div class="mbox">
      <div class="mic" id="mic"></div>
      <div class="mmsg" id="mmsg"></div>
      <div class="mdet" id="mdet"></div>
    </div>
  </div>
</div>

VESTIARIO"}, {"patrimonio": "6073524-4", "nome": "ROUPEIRO PARA VESTIARIO"}, {"patrimonio": "6073525-2", "nome": "ROUPEIRO PARA VESTIARIO"}, {"patrimonio": "6073526-0", "nome": "ROUPEIRO PARA VESTIARIO"}], "AEREA EXTERNA CIA": [{"patrimonio": "8736772-6", "nome": "CAMERA DE MONITORAMENTO MINI DOME"}, {"patrimonio": "8736773-4", "nome": "CAMERA DE MONITORAMENTO MINI DOME"}, {"patrimonio": "8736770-0", "nome": "CAMERA DE MONITORAMENTO MINI DOME"}, {"patrimonio": "8736771-8", "nome": "CAMERA DE MONITORAMENTO MINI DOME"}], "LAVANDERIA": [{"patrimonio": "8736774-2", "nome": "CAMERA DE MONITORAMENTO MINI DOME"}, {"patrimonio": "7721872-8", "nome": "COLETOR/CONTENTOR DE LIXO"}], "EXTINTOR DE INCENDIO": [{"patrimonio": "2544519-7", "nome": "EXTINTOR DE INCENDIO"}, {"patrimonio": "2544520-0", "nome": "EXTINTOR DE INCENDIO"}, {"patrimonio": "2547613-0", "nome": "EXTINTOR DE INCENDIO"}, {"patrimonio": "2547614-9", "nome": "EXTINTOR DE INCENDIO"}, {"patrimonio": "2547617-3", "nome": "EXTINTOR DE INCENDIO"}, {"patrimonio": "2547618-1", "nome": "EXTINTOR DE INCENDIO"}], "CELA": [{"patrimonio": "6380635-5", "nome": "GAVETEIRO USO ESCRITORIO"}], "VEST. OFICAIS": [{"patrimonio": "2547281-0", "nome": "TELEVISAO"}]};

// Remove acentos para comparação
function semAcento(s) {
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toUpperCase().trim();
}

var IGNORAR = ['VP ', 'MP ', 'BSC ', 'BCS ', 'BAIXADA', '18OBPM'];

var params = new URLSearchParams(window.location.search);
var LOCAL = decodeURIComponent(params.get('local') || '');
var ST = {};

// Match: tenta exato, depois normalizado
var LOCAL_KEY = null;
var keys = Object.keys(GRUPOS);
for (var ki = 0; ki < keys.length; ki++) {
  if (keys[ki] === LOCAL) { LOCAL_KEY = keys[ki]; break; }
}
if (!LOCAL_KEY) {
  for (var ki = 0; ki < keys.length; ki++) {
    if (semAcento(keys[ki]) === semAcento(LOCAL)) { LOCAL_KEY = keys[ki]; break; }
  }
}

if (!LOCAL || !LOCAL_KEY) {
  document.getElementById('erro-local').style.display = 'block';
} else {
  document.getElementById('app').style.display = 'block';
  document.getElementById('titulo-local').textContent = LOCAL_KEY;

  var n = localStorage.getItem('operador_nome') || '';
  if (n) document.getElementById('op').value = n;

  fetch(WEB_APP + '?acao=status_comodo')
    .then(function(r) { return r.json(); })
    .then(function(d) { ST = d; render(); })
    .catch(function() { render(); });
}

function corSit(v) {
  if (v === 'EM USO') return 'sit-em-uso';
  if (v === 'SUCATA') return 'sit-sucata';
  if (v === 'A DESCARREGAR') return 'sit-descarregar';
  if (v === 'EM MANUTENCAO') return 'sit-manutencao';
  return 'sit-em-uso';
}

function criarItem(item) {
  var st = ST[item.patrimonio] || {};
  var conf = st.status === 'CONFERIDO';
  var sit = (st.situacao && st.situacao !== 'undefined') ? st.situacao : 'EM USO';

  var div = document.createElement('div');
  div.className = 'item' + (conf ? ' ok' : '');
  div.id = 'i-' + item.patrimonio;

  var itopo = document.createElement('div'); itopo.className = 'itopo';
  var chk = document.createElement('input'); chk.type = 'checkbox'; chk.className = 'chk';
  chk.id = 'c-' + item.patrimonio; chk.checked = conf;
  chk.onchange = function() { tog(chk, item.patrimonio); };

  var iinfo = document.createElement('div'); iinfo.className = 'iinfo';
  var inome = document.createElement('div'); inome.className = 'inome'; inome.textContent = item.nome;
  var ipat = document.createElement('div'); ipat.className = 'ipat'; ipat.textContent = item.patrimonio;
  var iconf = document.createElement('div'); iconf.className = 'iconf'; iconf.id = 'cf-' + item.patrimonio;
  iconf.textContent = conf ? 'Por: ' + st.confPor + ' | Situacao: ' + sit : '';

  iinfo.appendChild(inome); iinfo.appendChild(ipat); iinfo.appendChild(iconf);
  itopo.appendChild(chk); itopo.appendChild(iinfo);

  var idet = document.createElement('div'); idet.className = 'idet'; idet.id = 'ob-' + item.patrimonio;
  if (conf) idet.style.display = 'block';

  var sel = document.createElement('select'); sel.id = 'st-' + item.patrimonio; sel.className = corSit(sit);
  ['EM USO','SUCATA','A DESCARREGAR','EM MANUTENCAO'].forEach(function(op) {
    var o = document.createElement('option'); o.value = op; o.textContent = op;
    if (sit === op) o.selected = true;
    sel.appendChild(o);
  });
  sel.onchange = function() { sel.className = corSit(sel.value); };

  var ta = document.createElement('textarea'); ta.id = 'tx-' + item.patrimonio;
  ta.placeholder = 'Observacao (opcional)...'; ta.value = st.obs || '';

  idet.appendChild(sel); idet.appendChild(ta);
  div.appendChild(itopo); div.appendChild(idet);
  return div;
}

function render() {
  var itens = GRUPOS[LOCAL_KEY] || [];
  var lista = document.getElementById('lista');
  lista.innerHTML = '';
  itens.forEach(function(item) { lista.appendChild(criarItem(item)); });
  prog();
}

function tog(chk, pat) {
  var d = document.getElementById('i-' + pat);
  var ob = document.getElementById('ob-' + pat);
  if (chk.checked) { d.classList.add('ok'); ob.style.display = 'block'; }
  else { d.classList.remove('ok'); ob.style.display = 'none'; }
  prog();
}

function prog() {
  var itens = GRUPOS[LOCAL_KEY] || [];
  var t = itens.length;
  var m = document.querySelectorAll('.chk:checked').length;
  var p = t > 0 ? Math.round(m / t * 100) : 0;
  document.getElementById('ptxt').textContent = m + ' de ' + t + ' itens marcados (' + p + '%)';
  document.getElementById('bfill').style.width = p + '%';
  document.getElementById('btn').disabled = m === 0;
}

function trocar() {
  localStorage.removeItem('operador_nome');
  document.getElementById('op').value = '';
  document.getElementById('op').focus();
}

function enviar() {
  var op = document.getElementById('op').value.trim();
  if (!op) { alert('Digite seu nome ou matricula.'); return; }
  localStorage.setItem('operador_nome', op);

  var itens = [];
  document.querySelectorAll('.chk:checked').forEach(function(c) {
    var p = c.id.replace('c-', '');
    var tx = document.getElementById('tx-' + p);
    var sit = document.getElementById('st-' + p);
    itens.push({ patrimonio: p, obs: tx ? tx.value.trim() : '', situacao: sit ? sit.value : 'EM USO' });
  });

  document.getElementById('btn').disabled = true;
  document.getElementById('btn').textContent = 'Enviando...';

  fetch(WEB_APP, {
    method: 'POST',
    body: JSON.stringify({ tipo: 'comodo', itens: itens, operador: op })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    document.getElementById('mic').textContent = d.sucesso ? '✅' : '❌';
    document.getElementById('mmsg').textContent = d.sucesso ? d.confirmados + ' itens conferidos!' : 'Erro ao enviar';
    document.getElementById('mdet').textContent = d.sucesso ? 'Registrado em ' + d.dataHora : '';
    document.getElementById('modal').classList.add('show');
    if (d.sucesso) setTimeout(function() { location.reload(); }, 3000);
  })
  .catch(function() {
    document.getElementById('mic').textContent = '❌';
    document.getElementById('mmsg').textContent = 'Erro de conexao.';
    document.getElementById('modal').classList.add('show');
  });
}
</script>
</body>
</html>
